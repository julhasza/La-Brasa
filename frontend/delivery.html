<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Brasa - Delivery</title>
    <link rel="icon" href="imagens/favicon-la-brasa.png" type="image/png">
    <link rel="stylesheet" href="css/delivery.css">
</head>

<body>
    <div id="header-placeholder"></div>
    <main class="delivery-main">
        <section class="coluna-esquerda">
            <div class="upsell-box">
                <p>Opa! Antes de prosseguir, que tal uma<br>bebida para acompanhar?</p>
            </div>

            <div class="bebida-card">
                <img src="imagens/cocacola.png" alt="Refrigerante - Cola" class="bebida-img">
                <div class="bebida-info">
                    <h4>Refrigerante - Coca Cola</h4>
                    <span>400ml</span>
                </div>
                <button class="btn-incluir" data-nome="Refrigerante - Coca Cola" data-preco="7.00">Incluir</button>
            </div>

            <div class="bebida-card">
                <img src="imagens/refri-laranja.png" alt="Refrigerante - Laranja" class="bebida-img">
                <div class="bebida-info">
                    <h4>Refrigerante - Fanta Laranja</h4>
                    <span>400ml</span>
                </div>
                <button class="btn-incluir" data-nome="Refrigerante - Fanta Laranja" data-preco="6.00">Incluir</button>
            </div>
        </section>

        <aside class="coluna-direita">
            <div class="painel">
                <h2 class="painel-titulo">Carrinho</h2>
                <ul class="carrinho-lista" id="carrinho-lista">
                    <li class="carrinho-vazio" id="carrinho-vazio">Seu carrinho esta vazio.</li>
                </ul>
                <div class="carrinho-linha-total">
                    <span>Total</span>
                    <span class="total-valor" id="total-valor">R$ 0,00</span>
                </div>
            </div>

            <div class="painel">
                <h2 class="painel-titulo">Finalizar</h2>

                <div class="campo">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite aqui">
                </div>

                <div class="campo">
                    <label for="whatsapp">Whatsapp</label>
                    <input type="tel" id="whatsapp" placeholder="Digite aqui" maxlength="15">
                </div>

                <div class="campo">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="Digite o CEP" maxlength="9">
                </div>

                <div class="campo">
                    <label for="rua">Rua</label>
                    <input type="text" id="rua" placeholder="Rua">
                </div>

                <div class="campo">
                    <label for="numero">Numero</label>
                    <input type="text" id="numero" placeholder="Numero">
                </div>

                <div class="campo">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="Bairro">
                </div>

                <div class="campo">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" placeholder="Cidade">
                </div>

                <div class="campo">
                    <label for="uf">UF</label>
                    <input type="text" id="uf" placeholder="UF" maxlength="2">
                </div>

                <div class="campo">
                    <label for="pagamento">Pagamento</label>
                    <div class="select-wrapper">
                        <select id="pagamento">
                            <option value="" disabled selected>Escolha seu metodo</option>
                            <option value="pix">PIX</option>
                            <option value="credito">Cartao de Credito</option>
                            <option value="debito">Cartao de Debito</option>
                            <option value="dinheiro">Dinheiro</option>
                        </select>
                    </div>
                </div>

                <div class="campo" id="campo-troco" style="display:none;">
                    <label for="troco">Troco para</label>
                    <input type="number" id="troco" placeholder="Ex: 100,00">
                </div>

                <button class="btn-finalizar" id="btn-finalizar">Finalizar Pedido</button>
            </div>
        </aside>
    </main>

    <div class="modal-overlay" id="modal" style="display:none;">
        <div class="modal-box">
            <div class="modal-icone">OK</div>
            <h2>Pedido Enviado!</h2>
            <p id="modal-texto"></p>
            <button class="btn-modal-ok" id="btn-modal-ok">Fazer novo pedido</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer>
        <p>La Brasa - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
    <script src="delivery.js"></script>
</body>

</html>
