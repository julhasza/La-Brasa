<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Brasa - Cardápio</title>
    <link rel="stylesheet" href="css/cardapio.css">
</head>

<body>
    <div id="header-placeholder"></div>

    <button class="cart-open-btn" id="floating-cart-btn">
        CARRINHO <span id="cart-count">0</span>
    </button>

    <div class="cart-toast" id="cart-toast"></div>

    <aside id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Seu Pedido</h2>
            <button id="close-cart" class="close-btn">&times;</button>
        </div>

        <ul class="cart-items"></ul>

        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="checkout-btn">Finalizar Pedido</button>
        </div>
    </aside>

    <main class="hero-main">
        <div class="card">
            <h1 class="title-cardapio">CARDÁPIO COMPLETO</h1>
            <p class="cardapio-intro">Escolha suas pizzas, acompanhe o total no carrinho e finalize pelo delivery.</p>
            <hr>
            <div class="card-content" id="cardapio-container">
                <p>Carregando cardápio...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>La Brasa - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
