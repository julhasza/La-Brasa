<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Brasa - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <main class="login-page">
        <section class="login-brand">
            <img src="imagens/Gemini_Generated_Image_ynnosaynnosaynno-removebg-preview.png" alt="La Brasa Logo">
            <h1>La <span>Brasa</span></h1>
            <p>Acesse a plataforma para montar pedidos, acompanhar o delivery e consultar o cardápio.</p>
        </section>

        <section class="auth-card">
            <p class="eyebrow" id="auth-eyebrow">Bem-vindo</p>
            <h2 id="auth-title">Entrar na plataforma</h2>

            <form id="auth-form">
                <div class="campo cadastro-only">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Seu nome">
                </div>

                <div class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seuemail&#64;exemplo.com" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required minlength="4">
                </div>

                <button type="submit" class="btn-auth" id="auth-submit">Entrar</button>
            </form>

            <p class="auth-switch">
                <span id="switch-text">Não tem cadastro?</span>
                <button type="button" id="switch-mode">Cadastre-se</button>
            </p>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="login.js"></script>
</body>

</html>
